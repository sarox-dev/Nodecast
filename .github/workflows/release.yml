name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
 release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version.json
        shell: bash
        run: |
          V="${GITHUB_REF_NAME#v}"
          DATE="$(date -u +%Y-%m-%d)"
          echo "{\"version\": \"${V}\", \"build\": \"${DATE}\"}" > version.json
          echo "Bumped version.json to $V ($DATE)"

      - name: Update CHANGELOG.md
        shell: bash
        run: |
          V="${GITHUB_REF_NAME#v}"
          DATE="$(date -u +%Y-%m-%d)"
          PREV_TAG=$(git tag --sort=-version:refname | grep -vx "$GITHUB_REF_NAME" | head -n1)
          LOG=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s (%h)" 2>/dev/null || echo "- Initial release")
          HEADER="## v${V} (${DATE})"
          TMP=$(mktemp)
          echo "$HEADER" > "$TMP"
          echo "" >> "$TMP"
          echo "$LOG" >> "$TMP"
          echo "" >> "$TMP"
          echo "" >> "$TMP"
          cat CHANGELOG.md >> "$TMP" 2>/dev/null || true
          mv "$TMP" CHANGELOG.md
          echo "Updated CHANGELOG.md"

      - name: Commit version bump
        shell: bash
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add version.json CHANGELOG.md
          git commit -m "chore: bump version to ${GITHUB_REF_NAME#v}" || echo "Nothing to commit"
          git push origin HEAD:${GITHUB_REF_NAME} 2>/dev/null || echo "Push skipped (detached HEAD)"

      - name: Generate release notes
        id: notes
        shell: bash
        run: |
          CURRENT_TAG="${GITHUB_REF_NAME}"
          PREV_TAG=$(git tag --sort=-version:refname | grep -vx "$CURRENT_TAG" | head -n1)

          if [ -z "$PREV_TAG" ]; then
            {
              echo "notes<<EOF"
              echo "## What's changed"
              echo
              echo "Initial release."
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "notes<<EOF"
              echo "## What's changed since $PREV_TAG"
              echo
              git log "$PREV_TAG..HEAD" --pretty=format:"- %s (%h)"
              echo
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Nodecast ${{ github.ref_name }}

          body: |
            ${{ steps.notes.outputs.notes }}

            ## Installation

            ### Linux / macOS

            ```bash
            curl -fsSL https://github.com/sarox-dev/Nodecast/releases/latest/download/install.sh | bash
            ```

            ### Windows (PowerShell)

            ```powershell
            irm https://github.com/sarox-dev/Nodecast/releases/latest/download/install.ps1 | iex
            ```

            ## Docker

            ```bash
            git clone https://github.com/sarox-dev/Nodecast.git
            cd Nodecast
            git checkout ${{ github.ref_name }}
            cp .env.example .env
            docker compose up -d
            ```

          files: |
            install.sh
            install.ps1

          overwrite_files: true
          draft: false
          prerelease: false
