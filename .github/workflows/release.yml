name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
 release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes
        id: notes
        shell: bash
        run: |
          CURRENT_TAG="${GITHUB_REF_NAME}"
          PREV_TAG=$(git tag --sort=-version:refname | grep -vx "$CURRENT_TAG" | head -n1)

          if [ -z "$PREV_TAG" ]; then
            {
              echo "notes<<EOF"
              echo "## What's changed"
              echo
              echo "Initial release."
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "notes<<EOF"
              echo "## What's changed since $PREV_TAG"
              echo
              git log "$PREV_TAG..HEAD" --pretty=format:"- %s (%h)"
              echo
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Recollect ${{ github.ref_name }}

          body: |
            ${{ steps.notes.outputs.notes }}

            ## Installation

            ### Linux / macOS

            ```bash
            curl -fsSL https://github.com/sarox-dev/Recollect/releases/latest/download/install.sh | bash
            ```

            ### Windows (PowerShell)

            ```powershell
            irm https://github.com/sarox-dev/Recollect/releases/latest/download/install.ps1 | iex
            ```

            ## Docker

            ```bash
            git clone https://github.com/sarox-dev/Recollect.git
            cd Recollect
            git checkout ${{ github.ref_name }}
            cp .env.example .env
            docker compose up -d
            ```

          files: |
            install.sh
            install.ps1

          overwrite_files: true
          draft: false
          prerelease: false
